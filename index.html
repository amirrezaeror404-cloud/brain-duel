<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Duel</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
margin:0;
padding:20px;
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

.container{
max-width:550px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.play{background:#38bdf8;color:white;}
.solo{background:#22c55e;color:white;}
.answer{background:white;color:black;}
</style>

</head>
<body>

<div class="container">

<h1>🧠 Brain Duel HARD</h1>

<p id="user"></p>

<button class="play" onclick="findMatch()">Play Online</button>
<button class="solo" onclick="startSolo()">Play Solo</button>

<h3 id="status"></h3>
<h2 id="timer"></h2>

<h2 id="question"></h2>
<div id="answers"></div>

<div id="result"></div>

</div>

<script>

// ---------------- USER ----------------
const tg = window.Telegram.WebApp;
tg.ready();

const user = {
id: tg.initDataUnsafe?.user?.id || Math.floor(Math.random()*999999),
name: tg.initDataUnsafe?.user?.first_name || "Guest"
};

document.getElementById("user").innerText =
"👋 Welcome " + user.name;

// ---------------- SOCKET ----------------
const socket = io("YOUR_SERVER_URL");

let matchId=null;
let solo=false;

let questions=[];
let index=0;
let score=0;
let answered=false;

let timer;
let time=10;

// ---------------- ALL QUESTIONS (HARD) ----------------
const ALL_QUESTIONS = [

{q:"If 3x=15, x=?",a:["3","5","7","9"],c:1},
{q:"Next number: 2,6,12,20,30,?",a:["40","41","42","44"],c:1},
{q:"Cube root of 64?",a:["2","3","4","8"],c:2},
{q:"0 factorial?",a:["0","1","undefined","10"],c:1},
{q:"Binary of 2?",a:["10","11","01","00"],c:0},
{q:"If today Monday, after 10 days?",a:["Wednesday","Thursday","Friday","Sunday"],c:1},
{q:"Which is NOT real number?",a:["0","-1","√-1","3"],c:2},
{q:"15% of 200?",a:["20","25","30","35"],c:2},
{q:"Odd one: Apple Banana Carrot Mango",a:["Apple","Banana","Carrot","Mango"],c:2},
{q:"If 8=64, 7=49, 6=?",a:["30","36","42","48"],c:1},

{q:"Prime number?",a:["21","27","29","33"],c:2},
{q:"Square of 13?",a:["144","156","169","196"],c:2},
{q:"Gas in air most?",a:["Oxygen","Nitrogen","CO2","Hydrogen"],c:1},
{q:"100-1-1-1=?",a:["997","998","999","996"],c:0},
{q:"Speed 100km in 4h?",a:["20","25","30","40"],c:1},
{q:"Which is programming?",a:["HTML","Python","Photoshop","Excel"],c:1},
{q:"Clock angle 3:15?",a:["0","7.5","30","45"],c:1},
{q:"If 1=3,2=6,3=9 then 4=?",a:["10","11","12","13"],c:2},
{q:"Which planet rings?",a:["Earth","Mars","Saturn","Venus"],c:2},
{q:"Sun is?",a:["Planet","Star","Moon","Rock"],c:1},

{q:"1 hour=?",a:["30","60","90","100"],c:1},
{q:"Ice is?",a:["Solid","Gas","Liquid","Plasma"],c:0},
{q:"Which heavier 1kg iron/cotton?",a:["Iron","Cotton","Same","Depends"],c:2},
{q:"Triangle angles sum?",a:["90","180","270","360"],c:1},
{q:"Human legs?",a:["1","2","3","4"],c:1},
{q:"Capital UK?",a:["London","Paris","Rome","Berlin"],c:0},
{q:"Water formula?",a:["CO2","H2O","O2","NaCl"],c:1},
{q:"Fastest animal?",a:["Lion","Cheetah","Tiger","Horse"],c:1},
{q:"5x5=?",a:["20","25","30","15"],c:1},
{q:"2+2=?",a:["3","4","5","6"],c:1}

];

// ---------------- SHUFFLE ----------------
function shuffle(a){
return [...a].sort(()=>Math.random()-0.5);
}

function getQuestions(){
return shuffle(ALL_QUESTIONS).slice(0,10);
}

// ---------------- MODE SELECT ----------------
function startSolo(){

solo=true;
matchId=null;

questions=getQuestions();
index=0;
score=0;

document.getElementById("status").innerText="Solo Mode";

loadQuestion();
}

// ---------------- ONLINE ----------------
function findMatch(){

solo=false;

socket.emit("find_match",{
id:user.id,
name:user.name
});

document.getElementById("status").innerText="Searching...";
}

// ---------------- MATCH FOUND ----------------
socket.on("match_found",(data)=>{
matchId=data.matchId;
document.getElementById("status").innerText="Match Found!";
});

// ---------------- ONLINE QUESTION ----------------
socket.on("question",(q)=>{

if(solo) return;

loadOnlineQuestion(q);
});

// ---------------- LOAD SOLO ----------------
function loadQuestion(){

if(index>=questions.length){
return endGame();
}

answered=false;
time=10;
startTimer();

const q=questions[index];

document.getElementById("question").innerText=q.q;
document.getElementById("answers").innerHTML="";

q.a.forEach((opt,i)=>{

const btn=document.createElement("button");
btn.className="answer";
btn.innerText=opt;

btn.onclick=()=>answer(i);

document.getElementById("answers").appendChild(btn);

});

}

// ---------------- LOAD ONLINE ----------------
function loadOnlineQuestion(q){

answered=false;
time=10;
startTimer();

document.getElementById("question").innerText=q.q;
document.getElementById("answers").innerHTML="";

q.options.forEach((opt,i)=>{

const btn=document.createElement("button");
btn.className="answer";
btn.innerText=opt;

btn.onclick=()=>{

if(answered)return;
answered=true;

socket.emit("answer",{
matchId,
userId:user.id,
answer:i
});

};

document.getElementById("answers").appendChild(btn);

});

}

// ---------------- ANSWER SOLO ----------------
function answer(i){

if(answered)return;
answered=true;

if(i===questions[index].c)score++;

index++;
loadQuestion();
}

// ---------------- TIMER ----------------
function startTimer(){

clearInterval(timer);

document.getElementById("timer").innerText="Time: "+time;

timer=setInterval(()=>{

time--;
document.getElementById("timer").innerText="Time: "+time;

if(time<=0){
clearInterval(timer);

if(solo){
index++;
loadQuestion();
}else{
answered=true;
}
}

},1000);

}

// ---------------- END SOLO ----------------
function endGame(){

document.getElementById("question").innerHTML="";
document.getElementById("answers").innerHTML="";
document.getElementById("timer").innerHTML="";

document.getElementById("result").innerHTML=`
<h2>Game Over</h2>
<h3>Score: ${score}/${questions.length}</h3>
`;
}

// ---------------- MATCH END ----------------
socket.on("match_end",(data)=>{

document.getElementById("question").innerHTML="";
document.getElementById("answers").innerHTML="";
document.getElementById("timer").innerHTML="";

document.getElementById("result").innerHTML=`
<h2>Game Over</h2>
<h3>Winner: ${data.winner}</h3>
`;
});

</script>

</body>
</html>
