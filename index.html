<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Duel</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
margin:0;
padding:20px;
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

.container{
max-width:550px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.play{background:#38bdf8;color:white;}
.solo{background:#22c55e;color:white;}
.answer{background:white;color:black;}

#timer{font-size:22px;color:#facc15;}
#user{margin-bottom:10px;color:#38bdf8;font-weight:bold;}
</style>

</head>
<body>

<div class="container">

<h1>🧠 Brain Duel</h1>

<!-- 👇 Telegram welcome -->
<p id="user">Loading...</p>

<button class="play" onclick="findMatch()">Play Online</button>
<button class="solo" onclick="startSolo()">Play Solo</button>

<h3 id="status"></h3>
<h2 id="timer"></h2>

<h2 id="question"></h2>
<div id="answers"></div>

<div id="result"></div>

</div>

<script>

// ---------------- TELEGRAM USER ----------------
const tg = window.Telegram.WebApp;
tg.ready();

const user = {
id: tg.initDataUnsafe?.user?.id || Math.floor(Math.random()*999999),
name: tg.initDataUnsafe?.user?.first_name || "Guest"
};

document.getElementById("user").innerText =
"👋 Welcome " + user.name;

// ---------------- SOCKET ----------------
const socket = io("YOUR_SERVER_URL");

let matchId = null;
let solo = false;

let questions = [];
let index = 0;
let score = 0;
let answered = false;

let timer;
let time = 15;

// ---------------- HARD TRICK QUESTIONS ----------------
const ALL_QUESTIONS = [

{q:"If all cats are animals and no animals are stones, can cats be stones?",a:["Yes","No","Sometimes","Unknown"],c:1},

{q:"What comes next: 1,4,9,16,25, ?",a:["30","35","36","49"],c:2},

{q:"A bat and ball cost $1.10. Bat is $1 more. Ball?",a:["$0.10","$0.05","$0.01","$0.20"],c:1},

{q:"Which number missing: 2,3,5,7,11, ?",a:["12","13","14","15"],c:1},

{q:"What comes once in minute twice in moment?",a:["M","Time","Echo","Sound"],c:0},

{q:"Which is heavier 1kg iron or 1kg cotton?",a:["Iron","Cotton","Same","Depends"],c:2},

{q:"If yesterday was tomorrow, today is Friday. Today?",a:["Monday","Tuesday","Wednesday","Sunday"],c:1},

{q:"What has keys but no locks?",a:["Car","Keyboard","Door","Safe"],c:1},

{q:"Odd one: Sun, Moon, Earth, Apple",a:["Sun","Moon","Earth","Apple"],c:3},

{q:"Cube root of 27?",a:["2","3","4","5"],c:1},

{q:"Which is NOT real number?",a:["0","-1","√-1","3"],c:2},

{q:"15% of 300?",a:["30","35","40","45"],c:3},

{q:"Binary of 3?",a:["10","11","01","00"],c:1},

{q:"1=5,2=25,3=125,4=?",a:["256","512","625","1000"],c:2},

{q:"Closest planet to sun?",a:["Earth","Venus","Mercury","Mars"],c:2},

{q:"Triangle sum?",a:["90","180","270","360"],c:1},

{q:"Speed 100km in 4h?",a:["20","25","30","40"],c:1},

{q:"Square root 144?",a:["10","11","12","13"],c:2},

{q:"3+3=8 pattern, 4+4=?",a:["10","12","14","16"],c:2},

{q:"Plants absorb?",a:["O2","CO2","N2","H2"],c:1},

{q:"x+y=10, x=7 y=?",a:["2","3","4","5"],c:1},

{q:"Prime number?",a:["21","27","29","33"],c:2},

{q:"Programming language?",a:["HTML","Python","Photoshop","Excel"],c:1},

{q:"Ocean largest?",a:["Atlantic","Pacific","Indian","Arctic"],c:1},

{q:"Ice is?",a:["Solid","Gas","Liquid","Plasma"],c:0},

{q:"Human legs?",a:["1","2","3","4"],c:1},

{q:"UK capital?",a:["London","Paris","Rome","Berlin"],c:0},

{q:"Sun is?",a:["Planet","Star","Moon","Rock"],c:1},

{q:"0/5=?",a:["0","5","1","undefined"],c:0},

{q:"100-99+1=?",a:["0","1","2","3"],c:2}

];

// ---------------- SHUFFLE ----------------
function shuffle(a){
return [...a].sort(()=>Math.random()-0.5);
}

function getQuestions(){
return shuffle(ALL_QUESTIONS).slice(0,10);
}

// ---------------- SOLO ----------------
function startSolo(){

solo = true;
matchId = null;

questions = getQuestions();
index = 0;
score = 0;

document.getElementById("status").innerText = "Solo Mode";

loadQuestion();
}

// ---------------- ONLINE ----------------
function findMatch(){

solo = false;

socket.emit("find_match",{
id: user.id,
name: user.name
});

document.getElementById("status").innerText = "Searching...";
}

// ---------------- MATCH FOUND ----------------
socket.on("match_found",(data)=>{
matchId = data.matchId;
document.getElementById("status").innerText = "Match Found!";
});

// ---------------- ONLINE QUESTION ----------------
socket.on("question",(q)=>{
if(solo) return;
loadOnline(q);
});

// ---------------- LOAD SOLO ----------------
function loadQuestion(){

if(index >= questions.length){
return endGame();
}

answered = false;
time = 15;

startTimer();

const q = questions[index];

document.getElementById("question").innerText = q.q;
document.getElementById("answers").innerHTML = "";

q.a.forEach((opt,i)=>{

const btn = document.createElement("button");
btn.className = "answer";
btn.innerText = opt;

btn.onclick = ()=>answer(i);

document.getElementById("answers").appendChild(btn);

});

}

// ---------------- LOAD ONLINE ----------------
function loadOnline(q){

answered = false;
time = 15;

startTimer();

document.getElementById("question").innerText = q.q;
document.getElementById("answers").innerHTML = "";

q.options.forEach((opt,i)=>{

const btn = document.createElement("button");
btn.className = "answer";
btn.innerText = opt;

btn.onclick = ()=>{

if(answered) return;
answered = true;

socket.emit("answer",{
matchId,
userId: user.id,
answer: i
});

};

document.getElementById("answers").appendChild(btn);

});

}

// ---------------- ANSWER SOLO ----------------
function answer(i){

if(answered) return;
answered = true;

if(i === questions[index].c) score++;

index++;
loadQuestion();
}

// ---------------- TIMER ----------------
function startTimer(){

clearInterval(timer);

document.getElementById("timer").innerText = "⏳ " + time;

timer = setInterval(()=>{

time--;
document.getElementById("timer").innerText = "⏳ " + time;

if(time <= 0){
clearInterval(timer);

if(solo){
index++;
loadQuestion();
}else{
answered = true;
}
}

},1000);

}

// ---------------- END GAME SOLO ----------------
function endGame(){

document.getElementById("question").innerHTML = "";
document.getElementById("answers").innerHTML = "";
document.getElementById("timer").innerHTML = "";

let percent = Math.round((score/questions.length)*100);

document.getElementById("result").innerHTML = `
<h2>🏁 Game Over</h2>
<h3>Score: ${score}/10</h3>
<h2>${percent}% IQ Level</h2>
`;
}

// ---------------- ONLINE END ----------------
socket.on("match_end",(data)=>{

document.getElementById("question").innerHTML = "";
document.getElementById("answers").innerHTML = "";
document.getElementById("timer").innerHTML = "";

document.getElementById("result").innerHTML = `
<h2>🏁 Match Finished</h2>
<h3>Winner: ${data.winner}</h3>
`;
});

</script>

</body>
</html>
