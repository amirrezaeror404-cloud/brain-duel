<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Duel</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
margin:0;
padding:20px;
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

.container{
max-width:550px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.answer-btn{background:white;color:black;}
.play-btn{background:#38bdf8;color:white;}
</style>

</head>
<body>

<div class="container">

<h1>🧠 Brain Duel</h1>

<p id="username">Loading...</p>

<button class="play-btn" onclick="findMatch()">Find Match</button>

<h2 id="status"></h2>

<h2 id="question"></h2>
<div id="answers"></div>

<div id="result"></div>

</div>

<script>

// ---------------- TELEGRAM USER ----------------
const tg = window.Telegram.WebApp;
tg.ready();

let user = {
id: tg.initDataUnsafe?.user?.id || Math.floor(Math.random()*999999),
name: tg.initDataUnsafe?.user?.first_name || "Guest"
};

document.getElementById("username").innerText =
"👋 Welcome " + user.name;

// ---------------- SOCKET ----------------
const socket = io("https://YOUR-SERVER-URL"); // 👈 تغییر بده

let matchId = null;
let currentQuestion = null;

// ---------------- FIND MATCH ----------------
function findMatch(){
socket.emit("find_match", user);
document.getElementById("status").innerText = "Searching opponent...";
}

// ---------------- MATCH FOUND ----------------
socket.on("match_found", (data)=>{
matchId = data.matchId;
document.getElementById("status").innerText = "Match Found!";
});

// ---------------- QUESTION ----------------
socket.on("question", (q)=>{

currentQuestion = q;

document.getElementById("question").innerText = q.q;
document.getElementById("answers").innerHTML = "";

q.options.forEach((opt,i)=>{

const btn = document.createElement("button");
btn.className = "answer-btn";
btn.innerText = opt;

btn.onclick = ()=>{

socket.emit("answer",{
matchId,
userId:user.id,
answer:i
});

};

document.getElementById("answers").appendChild(btn);

});

});

// ---------------- MATCH END ----------------
socket.on("match_end",(data)=>{

document.getElementById("question").innerHTML="";
document.getElementById("answers").innerHTML="";

document.getElementById("result").innerHTML=`
<h2>Game Over</h2>
<h3>Winner: ${data.winner}</h3>
<pre>${JSON.stringify(data.scores,null,2)}</pre>
`;

});

</script>

</body>
</html>
