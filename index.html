<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Duel</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
margin:0;
padding:20px;
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

.container{
max-width:550px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.play{background:#38bdf8;color:white;}
.solo{background:#22c55e;color:white;}
.answer{background:white;color:black;}

</style>

</head>
<body>

<div class="container">

<h1>🧠 Brain Duel</h1>

<p id="user">Loading...</p>

<button class="play" onclick="findMatch()">Play Online</button>
<button class="solo" onclick="startSolo()">Play Solo</button>

<h3 id="status"></h3>
<h2 id="timer"></h2>

<h2 id="question"></h2>
<div id="answers"></div>

<div id="result"></div>

</div>

<script>

// ---------------- USER ----------------
const tg = window.Telegram.WebApp;
tg.ready();

const user = {
id: tg.initDataUnsafe?.user?.id || Math.floor(Math.random()*999999),
name: tg.initDataUnsafe?.user?.first_name || "Guest"
};

document.getElementById("user").innerText =
"👋 Welcome " + user.name;

// ---------------- SOCKET ----------------
const socket = io("YOUR_SERVER_URL");

let matchId=null;
let solo=false;
let questions=[];
let index=0;
let score=0;
let answered=false;
let timer;
let time=10;

// ---------------- QUESTIONS (SOLO) ----------------
const ALL_QUESTIONS=[
{q:"Capital of France?",a:["Berlin","Paris","Rome","London"],c:1},
{q:"2+2?",a:["3","4","5","6"],c:1},
{q:"Sky color?",a:["Green","Blue","Red","Yellow"],c:1},
{q:"5x2?",a:["10","11","12","13"],c:0},
{q:"Capital of Iran?",a:["Tehran","Shiraz","Tabriz","Mashhad"],c:0}
];

// ---------------- FIND MATCH ----------------
function findMatch(){
solo=false;
socket.emit("find_match",user);
document.getElementById("status").innerText="Searching...";
}

// ---------------- SOLO MODE ----------------
function startSolo(){

solo=true;
index=0;
score=0;

questions=[...ALL_QUESTIONS].sort(()=>Math.random()-0.5).slice(0,5);

document.getElementById("status").innerText="Solo Mode";

loadQuestion();
}

// ---------------- MATCH FOUND ----------------
socket.on("match_found",(data)=>{
matchId=data.matchId;
document.getElementById("status").innerText="Match Found!";
});

// ---------------- QUESTION (ONLINE) ----------------
socket.on("question",(q)=>{

if(solo) return;

loadOnlineQuestion(q);
});

// ---------------- LOAD SOLO ----------------
function loadQuestion(){

if(index>=questions.length){
return endGame();
}

answered=false;
time=10;
startTimer();

const q=questions[index];

document.getElementById("question").innerText=q.q;
document.getElementById("answers").innerHTML="";

q.a.forEach((opt,i)=>{

const btn=document.createElement("button");
btn.className="answer";

btn.innerText=opt;

btn.onclick=()=>answerSolo(i);

document.getElementById("answers").appendChild(btn);

});

}

// ---------------- LOAD ONLINE ----------------
function loadOnlineQuestion(q){

answered=false;
time=10;
startTimer();

document.getElementById("question").innerText=q.q;
document.getElementById("answers").innerHTML="";

q.options.forEach((opt,i)=>{

const btn=document.createElement("button");
btn.className="answer";

btn.innerText=opt;

btn.onclick=()=>{

if(answered)return;
answered=true;

socket.emit("answer",{
matchId,
userId:user.id,
answer:i
});

};

document.getElementById("answers").appendChild(btn);

});

}

// ---------------- SOLO ANSWER ----------------
function answerSolo(i){

if(answered)return;
answered=true;

if(i===questions[index].c){
score++;
}

index++;
loadQuestion();
}

// ---------------- TIMER ----------------
function startTimer(){

clearInterval(timer);

document.getElementById("timer").innerText="Time: "+time;

timer=setInterval(()=>{

time--;
document.getElementById("timer").innerText="Time: "+time;

if(time<=0){
clearInterval(timer);

if(solo){
index++;
loadQuestion();
}else{
answered=true;
}
}

},1000);
}

// ---------------- END SOLO ----------------
function endGame(){

document.getElementById("question").innerHTML="";
document.getElementById("answers").innerHTML="";
document.getElementById("timer").innerHTML="";

document.getElementById("result").innerHTML=`
<h2>Game Over</h2>
<h3>Score: ${score}/${questions.length}</h3>
`;
}

// ---------------- MATCH END ----------------
socket.on("match_end",(data)=>{

document.getElementById("question").innerHTML="";
document.getElementById("answers").innerHTML="";
document.getElementById("timer").innerHTML="";

document.getElementById("result").innerHTML=`
<h2>Game Over</h2>
<h3>Winner: ${data.winner}</h3>
`;
});

</script>

</body>
</html>
