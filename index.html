<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brain Duel</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
margin:0;
}

.container{
max-width:500px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}

h1{
color:#38bdf8;
}

#username{
margin-bottom:20px;
font-size:18px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
}

.answer-btn{
background:white;
}

.play-again{
background:#38bdf8;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>🧠 Brain Duel</h1>

<p id="username">Loading...</p>

<h2 id="question"></h2>

<div id="answers"></div>

<div id="result"></div>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.ready();

let userName = "Guest";

if(tg.initDataUnsafe &&
   tg.initDataUnsafe.user){

userName =
tg.initDataUnsafe.user.first_name;

}

document.getElementById("username")
.innerHTML =
"👋 Welcome " + userName;

const questions = [

{
question:"Which planet is known as the Red Planet?",
answers:["Earth","Mars","Jupiter","Venus"],
correct:1
},

{
question:"What is 9 × 9 ?",
answers:["72","81","91","99"],
correct:1
},

{
question:"Who lives in a pineapple under the sea?",
answers:["Mickey Mouse","SpongeBob","Shrek","Tom"],
correct:1
},

{
question:"What comes next? 2,4,8,16,?",
answers:["24","32","30","40"],
correct:1
},

{
question:"Which animal is known as the King of the Jungle?",
answers:["Tiger","Elephant","Lion","Bear"],
correct:2
},

{
question:"What is the capital of France?",
answers:["Berlin","Madrid","Paris","Rome"],
correct:2
},

{
question:"Which game features the character Steve?",
answers:["Roblox","Minecraft","Fortnite","GTA"],
correct:1
},

{
question:"How many days are there in a week?",
answers:["5","6","7","8"],
correct:2
},

{
question:"Which company created the iPhone?",
answers:["Samsung","Google","Apple","Microsoft"],
correct:2
},

{
question:"What is half of 100?",
answers:["40","50","60","70"],
correct:1
}

];

let currentQuestion = 0;
let score = 0;

const questionEl =
document.getElementById("question");

const answersEl =
document.getElementById("answers");

const resultEl =
document.getElementById("result");

function loadQuestion(){

const q = questions[currentQuestion];

questionEl.innerText =
`Question ${currentQuestion + 1}/10

${q.question}`;

answersEl.innerHTML = "";

q.answers.forEach((answer,index)=>{

const btn =
document.createElement("button");

btn.className="answer-btn";

btn.innerText = answer;

btn.onclick = ()=>{

if(index === q.correct){
score++;
}

currentQuestion++;

if(currentQuestion < questions.length){

loadQuestion();

}
else{

showResult();

}

};

answersEl.appendChild(btn);

});

}

function showResult(){

questionEl.innerHTML="";
answersEl.innerHTML="";

let percent =
Math.round(
(score/questions.length)*100
);

let title="";

if(percent>=90){
title="🧠 Genius";
}
else if(percent>=70){
title="⚡ Smart";
}
else if(percent>=40){
title="🧩 Average";
}
else{
title="🐣 Beginner";
}

resultEl.innerHTML = `

<h2>Quiz Completed!</h2>

<h1>${percent}/100</h1>

<h2>${title}</h2>

<p>You answered
${score}
out of
${questions.length}
correctly.</p>

<button class="play-again"
onclick="location.reload()">

🔄 Play Again

</button>

`;

}

loadQuestion();

</script>

</body>
</html>
