<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brain Duel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
padding:20px;
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

.container{
max-width:550px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.solo{background:#22c55e;color:white;}
.answer{background:white;color:black;}
.play{background:#38bdf8;color:white;}

#timer{font-size:22px;color:#facc15;}
#user{margin-bottom:10px;color:#38bdf8;font-weight:bold;}
</style>

</head>

<body>

<div class="container">

<h1>🧠 Brain Duel</h1>

<p id="user">Welcome Player</p>

<button class="solo" onclick="startGame()">Play Solo</button>

<h3 id="status"></h3>
<h2 id="timer"></h2>

<h2 id="question"></h2>
<div id="answers"></div>

<div id="result"></div>

</div>

<script>

// ---------------- SIMPLE USER ----------------
const user = {
name: "Player"
};

document.getElementById("user").innerText = "👋 Welcome " + user.name;

// ---------------- GAME DATA ----------------
let questions = [];
let index = 0;
let score = 0;
let timer;
let time = 15;
let answered = false;

// ---------------- QUESTIONS (SAFE & HARDER) ----------------
const ALL_QUESTIONS = [
{q:"What comes once in minute, twice in moment?",a:["M","Time","Echo","Sound"],c:0},
{q:"If 2+2=10 in base 3, what is 2+2 in base 10?",a:["4","10","6","8"],c:0},
{q:"Which number is prime?",a:["21","27","29","33"],c:2},
{q:"What has keys but no locks?",a:["Car","Keyboard","Door","Safe"],c:1},
{q:"Which is heavier 1kg iron or 1kg cotton?",a:["Iron","Cotton","Same","Depends"],c:2},
{q:"Square root of 144?",a:["10","11","12","13"],c:2},
{q:"If all roses are flowers, are all flowers roses?",a:["Yes","No","Maybe","Unknown"],c:1},
{q:"Binary of 3?",a:["10","11","01","00"],c:1},
{q:"0 divided by any number?",a:["0","1","undefined","infinite"],c:0},
{q:"Which planet is closest to sun?",a:["Earth","Venus","Mercury","Mars"],c:2}
];

// ---------------- START GAME ----------------
function startGame(){

questions = shuffle(ALL_QUESTIONS).slice(0,5);
index = 0;
score = 0;

document.getElementById("status").innerText = "Game Started";

loadQuestion();
}

// ---------------- LOAD QUESTION ----------------
function loadQuestion(){

if(index >= questions.length){
return endGame();
}

answered = false;
time = 15;

startTimer();

let q = questions[index];

document.getElementById("question").innerText = q.q;
document.getElementById("answers").innerHTML = "";

q.a.forEach((opt,i)=>{

let btn = document.createElement("button");
btn.className = "answer";
btn.innerText = opt;

btn.onclick = ()=>answer(i);

document.getElementById("answers").appendChild(btn);

});
}

// ---------------- ANSWER ----------------
function answer(i){

if(answered) return;
answered = true;

if(i === questions[index].c){
score++;
}

index++;
loadQuestion();
}

// ---------------- TIMER ----------------
function startTimer(){

clearInterval(timer);

document.getElementById("timer").innerText = "⏳ " + time;

timer = setInterval(()=>{

time--;
document.getElementById("timer").innerText = "⏳ " + time;

if(time <= 0){
clearInterval(timer);
index++;
loadQuestion();
}

},1000);
}

// ---------------- END GAME ----------------
function endGame(){

document.getElementById("question").innerHTML = "";
document.getElementById("answers").innerHTML = "";
document.getElementById("timer").innerHTML = "";

let percent = Math.round((score/questions.length)*100);

document.getElementById("result").innerHTML = `
<h2>🏁 Finished</h2>
<h3>Score: ${score}/${questions.length}</h3>
<h2>${percent}% IQ Level</h2>
<button onclick="startGame()" class="play">Play Again</button>
`;
}

// ---------------- SHUFFLE ----------------
function shuffle(a){
return [...a].sort(()=>Math.random()-0.5);
}

</script>

</body>
</html>
