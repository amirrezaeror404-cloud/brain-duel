<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Duel</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
margin:0;
padding:20px;
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

.container{
max-width:550px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.play{background:#38bdf8;color:white;}
.solo{background:#22c55e;color:white;}
.answer{background:white;color:black;}

#timer{font-size:22px;color:#facc15;}
</style>

</head>
<body>

<div class="container">

<h1>🧠 Brain Duel</h1>

<button class="play" onclick="findMatch()">Play Online</button>
<button class="solo" onclick="startSolo()">Play Solo</button>

<h3 id="status"></h3>
<h2 id="timer"></h2>

<h2 id="question"></h2>
<div id="answers"></div>

<div id="result"></div>

</div>

<script>

// ---------------- SOCKET ----------------
const socket = io("YOUR_SERVER_URL");

let matchId=null;
let solo=false;

let questions=[];
let index=0;
let score=0;
let answered=false;

let timer;
let time=15;

// ---------------- HARD TRICK QUESTIONS ----------------
const ALL_QUESTIONS = [

{q:"If you answer this question correctly, you are wrong. What is the correct action?",a:["Choose any","Skip","Select wrong option","Cannot be solved"],c:2},

{q:"A father has 4 sons. Each son has a sister. How many children?",a:["4","5","6","8"],c:1},

{q:"What disappears when you say its name?",a:["Shadow","Silence","Echo","Darkness"],c:1},

{q:"Which month has 28 days?",a:["February","All","None","Only Leap"],c:1},

{q:"If 1=5, 2=25, 3=325, 4=?",a:["4325","4321","4325","4320"],c:0},

{q:"What comes once in a minute, twice in a moment, but never in 100 years?",a:["Time","M","Second","Hour"],c:1},

{q:"A man builds a house with all 4 sides facing south. Bear appears outside. What color?",a:["White","Brown","Black","Impossible"],c:1},

{q:"If you multiply this answer by 0, what happens?",a:["0","1","Answer changes","Depends"],c:0},

{q:"Which is heavier? 1kg iron or 1kg air?",a:["Iron","Air","Same","Depends"],c:2},

{q:"You see me once in June, twice in November, but not in May. What am I?",a:["E","U","O","N"],c:2},

{q:"A plane crashes on border USA-Canada. Where bury survivors?",a:["USA","Canada","Border","Nowhere"],c:3},

{q:"Which word becomes shorter when you add 2 letters?",a:["Short","Long","Small","Tiny"],c:0},

{q:"If yesterday was tomorrow, today would be Friday. What day is today?",a:["Monday","Tuesday","Wednesday","Sunday"],c:1},

{q:"What has keys but no locks?",a:["Car","Keyboard","Door","Safe"],c:1},

{q:"Which number is always the same upside down?",a:["8","6","9","1"],c:0},

{q:"If all roses are flowers, some flowers fade, can all roses fade?",a:["Yes","No","Maybe","Unknown"],c:1},

{q:"What is full of holes but holds water?",a:["Net","Sponge","Bottle","Cup"],c:1},

{q:"You take away 2 from 5 and get 4. How?",a:["Roman","Math trick","Impossible","Typo"],c:0},

{q:"Which direction has no shadow at noon?",a:["North","South","Equator","Depends"],c:2},

{q:"If 10 people shake hands once each, how many shakes?",a:["10","20","45","100"],c:2},

{q:"What can travel around the world while staying in corner?",a:["Light","Stamp","Air","Signal"],c:1},

{q:"Which word is spelled wrong in dictionary?",a:["Wrong","Correct","Spelling","None"],c:0},

{q:"If you read me backwards I become heavy. What am I?",a:["Ton","Stone","Weight","Mass"],c:0},

{q:"What has 13 hearts but no organs?",a:["Deck of cards","Human","Animal","Tree"],c:0},

{q:"If 3 cats catch 3 mice in 3 minutes, 1 cat catches 1 mouse in?",a:["1","3","9","6"],c:1},

{q:"Which can fill a room without space?",a:["Air","Light","Smoke","Sound"],c:1},

{q:"What goes up but never comes down?",a:["Age","Ball","Smoke","Water"],c:0},

{q:"If you drop a red stone in blue sea what happens?",a:["Red","Blue","Wet","Sinks"],c:0},

{q:"What has no life but can die?",a:["Battery","Fire","Stone","Air"],c:1},

{q:"If 5+5=25, 6+6=?",a:["30","36","66","12"],c:1}

];

// ---------------- SHUFFLE ----------------
function shuffle(a){
return [...a].sort(()=>Math.random()-0.5);
}

function getQuestions(){
return shuffle(ALL_QUESTIONS).slice(0,10);
}

// ---------------- SOLO ----------------
function startSolo(){
solo=true;
matchId=null;

questions=getQuestions();
index=0;
score=0;

document.getElementById("status").innerText="Solo Mode";

loadQuestion();
}

// ---------------- ONLINE ----------------
function findMatch(){
solo=false;

socket.emit("find_match",{id:Math.random()*999999});

document.getElementById("status").innerText="Searching...";
}

// ---------------- MATCH ----------------
socket.on("match_found",(data)=>{
matchId=data.matchId;
document.getElementById("status").innerText="Match Found!";
});

// ---------------- QUESTION ONLINE ----------------
socket.on("question",(q)=>{
if(solo) return;
loadOnline(q);
});

// ---------------- LOAD SOLO ----------------
function loadQuestion(){

if(index>=questions.length){
return endGame();
}

answered=false;
time=15;

startTimer();

const q=questions[index];

document.getElementById("question").innerText=q.q;
document.getElementById("answers").innerHTML="";

q.a.forEach((opt,i)=>{

const btn=document.createElement("button");
btn.className="answer";
btn.innerText=opt;

btn.onclick=()=>answer(i);

document.getElementById("answers").appendChild(btn);

});

}

// ---------------- LOAD ONLINE ----------------
function loadOnline(q){

answered=false;
time=15;

startTimer();

document.getElementById("question").innerText=q.q;
document.getElementById("answers").innerHTML="";

q.options.forEach((opt,i)=>{

const btn=document.createElement("button");
btn.className="answer";
btn.innerText=opt;

btn.onclick=()=>{

if(answered)return;
answered=true;

socket.emit("answer",{
matchId,
userId:socket.id,
answer:i
});

};

document.getElementById("answers").appendChild(btn);

});

}

// ---------------- ANSWER SOLO ----------------
function answer(i){

if(answered)return;
answered=true;

if(i===questions[index].c)score++;

index++;
loadQuestion();
}

// ---------------- TIMER ----------------
function startTimer(){

clearInterval(timer);

document.getElementById("timer").innerText="⏳ "+time;

timer=setInterval(()=>{

time--;
document.getElementById("timer").innerText="⏳ "+time;

if(time<=0){
clearInterval(timer);

if(solo){
index++;
loadQuestion();
}else{
answered=true;
}
}

},1000);

}

// ---------------- END ----------------
function endGame(){

document.getElementById("question").innerHTML="";
document.getElementById("answers").innerHTML="";
document.getElementById("timer").innerHTML="";

let percent=Math.round((score/questions.length)*100);

document.getElementById("result").innerHTML=`
<h2>🏁 Game Over</h2>
<h3>Score: ${score}/10</h3>
<h2>${percent}% IQ Level</h2>
`;
}

</script>

</body>
</html>
